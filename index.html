<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--verde:#3B6D11;--verde-claro:#EAF3DE;--verde-med:#639922;--amarillo:#854F0B;--amarillo-claro:#FAEEDA;--rojo:#A32D2D;--rojo-claro:#FCEBEB;--gris:#f5f5f3;--borde:#e0e0dc;--texto:#1a1a1a;--texto2:#666}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gris);color:var(--texto);min-height:100vh;padding-bottom:70px}
.topbar{background:white;border-bottom:1px solid var(--borde);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--verde)}
.logo small{font-size:11px;color:var(--texto2);font-weight:400;display:block}
.badge{background:var(--verde-claro);color:var(--verde);font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--borde);display:flex;z-index:100}
.navbtn{flex:1;padding:10px 4px 8px;text-align:center;font-size:10px;color:var(--texto2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.navbtn.active{color:var(--verde);border-bottom-color:var(--verde)}
.navbtn svg{display:block;margin:0 auto 3px;width:22px;height:22px}
.screen{display:none;padding:14px}
.screen.active{display:block}
.card{background:white;border-radius:14px;border:1px solid var(--borde);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--gris);border-radius:10px;padding:12px}
.stat-label{font-size:11px;color:var(--texto2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--verde)}
.stat-val.amber{color:var(--amarillo)}
.lote-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lote-card{background:white;border:1px solid var(--borde);border-radius:12px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.lote-card:active{transform:scale(0.97)}
.lote-card:hover{border-color:var(--verde)}
.lote-num{font-size:10px;color:var(--texto2);margin-bottom:2px}
.lote-cultivo{font-size:13px;font-weight:600;margin-bottom:5px}
.lote-ha{font-size:11px;color:var(--texto2);margin-bottom:5px}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill.verde{background:var(--verde-claro);color:var(--verde)}
.pill.amarillo{background:var(--amarillo-claro);color:var(--amarillo)}
.pill.rojo{background:var(--rojo-claro);color:var(--rojo)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--verde);color:white;width:100%;justify-content:center;padding:13px}
.btn-secondary{background:var(--gris);color:var(--texto);border:1px solid var(--borde);width:100%;justify-content:center;padding:13px}
.drop-area{border:2px dashed var(--borde);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:white;margin-bottom:14px;position:relative}
.drop-area:hover,.drop-area.drag{border-color:var(--verde);background:var(--verde-claro)}
.drop-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:52px;margin-bottom:12px}
.drop-title{font-size:17px;font-weight:600;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--texto2);line-height:1.5}
.preview{width:100%;max-height:300px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:block}
.loading{text-align:center;padding:32px;background:white;border-radius:14px;border:1px solid var(--borde);margin-bottom:12px}
.spinner{width:44px;height:44px;border:3px solid var(--verde-claro);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:14px;color:var(--texto2);margin-top:6px}
.resultado{background:white;border-radius:14px;border:1px solid var(--borde);overflow:hidden;margin-bottom:12px}
.resultado-header{padding:14px 16px;border-bottom:1px solid var(--borde);display:flex;gap:12px;align-items:center}
.sev-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.sev-grave{background:var(--rojo-claro);color:var(--rojo)}
.sev-moderado{background:var(--amarillo-claro);color:var(--amarillo)}
.sev-leve{background:var(--verde-claro);color:var(--verde)}
.resultado-body{padding:14px 16px}
.res-seccion{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--borde)}
.res-seccion:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.res-titulo{font-size:11px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.res-texto{font-size:14px;line-height:1.7;white-space:pre-line}
.plantid-badge{background:#1a1a2e;color:white;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px}
.plaga-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--borde)}
.plaga-row:last-child{border-bottom:none}
.plaga-nombre{font-size:13px;font-weight:500;flex:1}
.plaga-bar-wrap{width:80px;height:6px;background:var(--gris);border-radius:4px;overflow:hidden}
.plaga-bar{height:100%;border-radius:4px;background:var(--verde)}
.plaga-pct{font-size:12px;color:var(--texto2);min-width:36px;text-align:right}
.detalle-back{display:flex;align-items:center;gap:8px;color:var(--verde);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:14px;padding:8px 0}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--texto2);margin:12px 0 4px}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:14px;background:white}
.alerta-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--borde)}
.alerta-item:last-child{border-bottom:none}
.alerta-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alerta-dot.rojo{background:var(--rojo)}
.alerta-dot.amarillo{background:var(--amarillo)}
.alerta-dot.verde{background:var(--verde)}
.alerta-titulo{font-size:14px;font-weight:500}
.alerta-desc{font-size:12px;color:var(--texto2);margin-top:2px}
.tab-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--borde);background:white;color:var(--texto2)}
.tab.active{background:var(--verde);color:white;border-color:var(--verde)}
.chart-wrap{position:relative;height:200px;margin-top:8px}
.import-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:white;border:1px solid var(--borde);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;width:100%;position:relative}
.import-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.error-box{background:var(--rojo-claro);border:1px solid var(--rojo);border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px;color:var(--rojo)}
.config-box{background:var(--amarillo-claro);border:1px solid #e0c080;border-radius:12px;padding:14px;margin-bottom:14px}
.config-box p{font-size:13px;color:var(--amarillo);margin-bottom:8px}
</style>

const RIEGO = {
  'Palta Hass':{dias:7,agua:'35-40 mm/semana',abono:'N-P-K 20-20-20, cada 15 días'},
  'Palta Fuerte':{dias:7,agua:'35-40 mm/semana',abono:'N-P-K 20-20-20, cada 15 días'},
  'Palta Naval':{dias:7,agua:'30-35 mm/semana',abono:'N-P-K, cada 15 días'},

  'Vivero':{dias:2,agua:'Riego diario',abono:'Solución nutritiva semanal'}
};

let monitoreoData = JSON.parse(localStorage.getItem('monitoreo')||'{}');
let excelData = JSON.parse(localStorage.getItem('excelData')||'{}');
let historialIA = JSON.parse(localStorage.getItem('historialIA')||'[]');
let currentLote = null;
let chartInicio = null;

function go(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  const idx = ['ia','dashboard','lotes','alertas'].indexOf(name);
  if(idx>=0) document.querySelectorAll('.navbtn')[idx].classList.add('active');
  if(name==='ia') renderIA();
  if(name==='dashboard') renderDashboard();
  if(name==='lotes') renderLotes();
  if(name==='alertas') renderAlertas();
}

function getEstado(loteId) {
  const m = [...(excelData[loteId]||[]),...(monitoreoData[loteId]||[])];
  if(!m.length) return {estado:'verde',inc:0};
  const ult = m[m.length-1];
  const vals = Object.values(ult.plagas||{}).filter(v=>v>0);
  const max = vals.length?Math.max(...vals):0;
  return {estado:max>=0.16?'rojo':max>=0.08?'amarillo':'verde',inc:max};
}

function renderIA() {
  document.getElementById('s-ia').innerHTML = `
    <div class="drop-area" id="drop-area" onclick="document.getElementById('file-input').click()" ondragover="ev(event,'drag')" ondragleave="ev(event,'')" ondrop="drop(event)">
      <input type="file" id="file-input" accept="image/*,video/*" onchange="handleFile(this.files[0])">
      <div class="drop-icon">📷</div>
      <div class="drop-title">Arrastra foto o video aquí</div>
      <div class="drop-sub">O toca para abrir galería / cámara<br>Funciona con fotos de WhatsApp<br><small style="color:var(--verde);font-weight:500">✓ plant.id + crop.health + Claude Vision</small></div>
    </div>
    <div id="ia-resultado"></div>
    ${historialIA.length?`<div class="card">
      <div class="card-title">Últimos análisis (${historialIA.length})</div>
      ${historialIA.slice(-5).reverse().map(h=>`
        <div class="plaga-row">
          <div style="flex:1">
            <div class="plaga-nombre">${h.cultivo||'Cultivo'} — ${h.problema||'Análisis'}</div>
            <div style="font-size:11px;color:var(--texto2)">${h.fecha} · ${h.lote||''}</div>
          </div>
          <span class="pill ${h.severidad==='Grave'?'rojo':h.severidad==='Moderado'?'amarillo':'verde'}">${h.severidad||'—'}</span>
        </div>`).join('')}
    </div>`:''}
  `;
}

function ev(e,cls) { e.preventDefault(); document.getElementById('drop-area').className='drop-area'+(cls?' '+cls:''); }
function drop(e) { e.preventDefault(); document.getElementById('drop-area').className='drop-area'; handleFile(e.dataTransfer.files[0]); }


function handleFile(file) {
  if(!file) return;
  if(file.type.startsWith('video/')) { handleVideo(file); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    const mime = file.type||'image/jpeg';
    showPreview(e.target.result);
    analizar(b64, mime);
  };
  reader.readAsDataURL(file);
}

function handleVideo(file) {
  const video = document.createElement('video');
  const canvas = document.createElement('canvas');
  video.src = URL.createObjectURL(file);
  video.onloadeddata = () => {
    video.currentTime = Math.min(2, video.duration/3);
  };
  video.onseeked = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const dataUrl = canvas.toDataURL('image/jpeg',0.85);
    const b64 = dataUrl.split(',')[1];
    showPreview(dataUrl);
    analizar(b64, 'image/jpeg');
    URL.revokeObjectURL(video.src);
  };
  video.load();
}

function showPreview(src) {
  document.getElementById('drop-area').innerHTML = `<img src="${src}" class="preview" style="margin:0;border-radius:10px">`;
}

async function analizar(b64, mime) {
  document.getElementById('ia-resultado').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div style="font-weight:500">Analizando imagen...</div>
      <div class="loading-step" id="loading-step">Consultando plant.id + crop.health + Claude Vision...</div>
    </div>`;

  try {
    document.getElementById('loading-step').textContent = 'Procesando con inteligencia artificial...';
    const res = await fetch('https://fundo-ishizawa2-1.onrender.com/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({image: b64, mediaType: mime})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    const texto = data.resultado;

    const cultivoMatch = texto.match(/🌿 CULTIVO:\s*(.+)/);
    const problemaMatch = texto.match(/🔍 PROBLEMA:\s*(.+)/);
    const sevMatch = texto.match(/🚨 SEVERIDAD:\s*(Leve|Moderado|Grave)/i);
    const cultivo = cultivoMatch?.[1]?.trim() || data.cultivo || 'Cultivo';
    const problema = problemaMatch?.[1]?.trim() || 'Ver diagnóstico';
    const sev = sevMatch?.[1] || data.severidad || 'Moderado';
    const enfermedadesDetectadas = (data.enfermedades||[]).map(e=>({
      nombre: e.name,
      prob: (e.probability*100).toFixed(0)
    }));

    const entrada = {fecha:new Date().toLocaleDateString('es-PE'),cultivo,problema,severidad:sev,lote:''};
    historialIA.unshift(entrada);
    if(historialIA.length>50) historialIA.pop();
    localStorage.setItem('historialIA', JSON.stringify(historialIA));

    document.getElementById('ia-resultado').innerHTML = `
      <div class="resultado">
        <div class="resultado-header">
          <div style="flex:1">
            <div style="font-size:15px;font-weight:600">${cultivo}</div>
            <div style="font-size:12px;color:var(--texto2)">${problema}</div>
          </div>
          <span class="sev-badge sev-${sev.toLowerCase()}">${sev}</span>
        </div>
        ${enfermedadesDetectadas.length ? `<div style="padding:10px 16px;border-bottom:1px solid var(--borde);background:var(--gris)">
          <div style="font-size:10px;font-weight:600;color:var(--texto2);margin-bottom:6px">PLANT.ID + CROP.HEALTH <span class="plantid-badge">datos científicos</span></div>
          ${enfermedadesDetectadas.map(e=>`<div class="plaga-row" style="padding:4px 0">

function importExcel(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      let total = 0;
      wb.SheetNames.forEach(sheetName=>{
        const match = sheetName.match(/LOTE[\s]?(\w+)/i);
        if(!match) return;
        const loteId = match[1].trim();
        if(!LOTES.find(l=>l.id===loteId)) return;
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:0});
        if(data.length<2) return;
        const headers = data[0];
        const registros = [];
        for(let i=1;i<data.length;i++){
          const row = data[i];
          if(!row||!row[0]) continue;
          let fecha;
          if(row[0] instanceof Date) fecha=row[0].toISOString().split('T')[0];
          else if(typeof row[0]==='number') fecha=new Date(Math.round((row[0]-25569)*86400*1000)).toISOString().split('T')[0];
          else fecha=String(row[0]).trim();
          if(!fecha||fecha==='null') continue;
          const plagas={};
          for(let j=1;j<headers.length;j++){
            if(headers[j]&&row[j]!==undefined) plagas[String(headers[j]).trim()]=parseFloat(row[j])||0;
          }
          registros.push({fecha,plagas});
        }
        if(registros.length){ excelData[loteId]=registros; total+=registros.length; }
      });
      localStorage.setItem('excelData',JSON.stringify(excelData));
      alert(`✅ Excel importado: ${total} registros de ${Object.keys(excelData).length} lotes`);
      renderDashboard();
    } catch(err){ alert('Error: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function guardarMonitoreo(loteId) {
  const lote = LOTES.find(l=>l.id===loteId);
  const fecha = document.getElementById('m-fecha').value;
  const plagas = {};
  lote.plagas.forEach(p=>{
    const id = 'mp-'+p.replace(/\s/g,'_');
    const val = parseFloat(document.getElementById(id)?.value||0);
    if(!isNaN(val)) plagas[p]=val;
  });
  const temp = document.getElementById('m-temp')?.value;
  const hum = document.getElementById('m-hum')?.value;
  if(!monitoreoData[loteId]) monitoreoData[loteId]=[];
  monitoreoData[loteId].push({fecha,plagas,temp:temp?parseFloat(temp):null,hum:hum?parseFloat(hum):null});
  localStorage.setItem('monitoreo',JSON.stringify(monitoreoData));
  localStorage.setItem('riego_'+loteId,new Date().toISOString());
  alert('✅ Monitoreo guardado');
  verDetalle(loteId);
}

function renderAlertas() {
  const alertas = [];
  LOTES.forEach(l=>{
    const r = RIEGO[l.cultivo]||{dias:7};
    const ult = localStorage.getItem('riego_'+l.id);
    const dias = ult?Math.floor((Date.now()-new Date(ult).getTime())/864e5):999;
    if(dias>=r.dias) alertas.push({lote:l,dias,urgente:dias>r.dias+3,riego:r});
    const e = getEstado(l.id);
    if(e.estado==='rojo') alertas.unshift({lote:l,tipo:'critico',inc:e.inc});
  });

  document.getElementById('s-alertas').innerHTML = `
    <div class="card">
      <div class="card-title">Alertas fitosanitarias</div>
      ${LOTES.filter(l=>getEstado(l.id).estado!=='verde').map(l=>{
        const e=getEstado(l.id);
        return `<div class="alerta-item">
          <div class="alerta-dot ${e.estado}"></div>
          <div style="flex:1">
            <div class="alerta-titulo">${l.nombre} — ${l.cultivo}</div>
            <div class="alerta-desc">Incidencia: ${(e.inc*100).toFixed(0)}% — ${e.estado==='rojo'?'Aplicar producto urgente':'Monitorear de cerca'}</div>
          </div>
          <button onclick="verDetalle('${l.id}')" style="font-size:11px;padding:4px 10px;background:var(--verde);color:white;border:none;border-radius:6px;cursor:pointer">Ver</button>
        </div>`;
      }).join('')||`<div style="text-align:center;padding:20px;color:var(--texto2);font-size:13px">✅ Todos los lotes sin alertas fitosanitarias</div>`}
    </div>
    <div class="card">
      <div class="card-title">Alertas de riego</div>
      ${alertas.filter(a=>!a.tipo).slice(0,8).map(a=>`
        <div class="alerta-item">
          <div class="alerta-dot ${a.urgente?'rojo':'amarillo'}"></div>
          <div style="flex:1">
            <div class="alerta-titulo">${a.lote.nombre} — ${a.lote.cultivo}</div>
            <div class="alerta-desc">${a.dias>900?'Sin registro de riego':('Último riego hace '+a.dias+' días')} · ${a.riego.agua||''}</div>
          </div>
          <button onclick="marcarRiego('${a.lote.id}')" style="font-size:11px;padding:4px 10px;background:var(--verde);color:white;border:none;border-radius:6px;cursor:pointer">Regar</button>
