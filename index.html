<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--verde:#3B6D11;--verde-claro:#EAF3DE;--verde-med:#639922;--amarillo:#854F0B;--amarillo-claro:#FAEEDA;--rojo:#A32D2D;--rojo-claro:#FCEBEB;--gris:#f5f5f3;--borde:#e0e0dc;--texto:#1a1a1a;--texto2:#666}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gris);color:var(--texto);min-height:100vh;padding-bottom:70px}
.topbar{background:white;border-bottom:1px solid var(--borde);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:700;color:var(--verde)}
.logo small{font-size:11px;color:var(--texto2);font-weight:400;display:block}
.badge{background:var(--verde-claro);color:var(--verde);font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--borde);display:flex;z-index:100}
.navbtn{flex:1;padding:10px 4px 8px;text-align:center;font-size:10px;color:var(--texto2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.navbtn.active{color:var(--verde);border-bottom-color:var(--verde)}
.navbtn svg{display:block;margin:0 auto 3px;width:22px;height:22px}
.screen{display:none;padding:14px}
.screen.active{display:block}
.card{background:white;border-radius:14px;border:1px solid var(--borde);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--gris);border-radius:10px;padding:12px}
.stat-label{font-size:11px;color:var(--texto2);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;color:var(--verde)}
.stat-val.amber{color:var(--amarillo)}
.lote-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lote-card{background:white;border:1px solid var(--borde);border-radius:12px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.lote-card:active{transform:scale(0.97)}
.lote-card:hover{border-color:var(--verde)}
.lote-num{font-size:10px;color:var(--texto2);margin-bottom:2px}
.lote-cultivo{font-size:13px;font-weight:600;margin-bottom:5px}
.lote-ha{font-size:11px;color:var(--texto2);margin-bottom:5px}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill.verde{background:var(--verde-claro);color:var(--verde)}
.pill.amarillo{background:var(--amarillo-claro);color:var(--amarillo)}
.pill.rojo{background:var(--rojo-claro);color:var(--rojo)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--verde);color:white;width:100%;justify-content:center;padding:13px}
.btn-secondary{background:var(--gris);color:var(--texto);border:1px solid var(--borde);width:100%;justify-content:center;padding:13px}
.drop-area{border:2px dashed var(--borde);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:white;margin-bottom:14px;position:relative}
.drop-area:hover,.drop-area.drag{border-color:var(--verde);background:var(--verde-claro)}
.drop-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:52px;margin-bottom:12px}
.drop-title{font-size:17px;font-weight:600;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--texto2);line-height:1.5}
.preview{width:100%;max-height:500px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:block}
.loading{text-align:center;padding:32px;background:white;border-radius:14px;border:1px solid var(--borde);margin-bottom:12px}
.spinner{width:44px;height:44px;border:3px solid var(--verde-claro);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-step{font-size:14px;color:var(--texto2);margin-top:6px}
.resultado{background:white;border-radius:14px;border:1px solid var(--borde);overflow:hidden;margin-bottom:12px}
.resultado-header{padding:14px 16px;border-bottom:1px solid var(--borde);display:flex;gap:12px;align-items:center}
.sev-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.sev-grave{background:var(--rojo-claro);color:var(--rojo)}
.sev-moderado{background:var(--amarillo-claro);color:var(--amarillo)}
.sev-leve{background:var(--verde-claro);color:var(--verde)}
.resultado-body{padding:14px 16px}
.res-seccion{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--borde)}
.res-seccion:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.res-titulo{font-size:11px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.res-texto{font-size:14px;line-height:1.7;white-space:pre-line}
.plantid-badge{background:#1a1a2e;color:white;font-size:11px;padding:2px 8px;border-radius:20px;margin-left:8px}
.plaga-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--borde)}
.plaga-row:last-child{border-bottom:none}
.plaga-nombre{font-size:13px;font-weight:500;flex:1}
.plaga-bar-wrap{width:80px;height:6px;background:var(--gris);border-radius:4px;overflow:hidden}
.plaga-bar{height:100%;border-radius:4px;background:var(--verde)}
.plaga-pct{font-size:12px;color:var(--texto2);min-width:36px;text-align:right}
.detalle-back{display:flex;align-items:center;gap:8px;color:var(--verde);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:14px;padding:8px 0}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--texto2);margin:12px 0 4px}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:14px;background:white}
.alerta-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--borde)}
.alerta-item:last-child{border-bottom:none}
.alerta-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alerta-dot.rojo{background:var(--rojo)}
.alerta-dot.amarillo{background:var(--amarillo)}
.alerta-dot.verde{background:var(--verde)}
.alerta-titulo{font-size:14px;font-weight:500}
.alerta-desc{font-size:12px;color:var(--texto2);margin-top:2px}
.tab-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--borde);background:white;color:var(--texto2)}
.tab.active{background:var(--verde);color:white;border-color:var(--verde)}
.chart-wrap{position:relative;height:200px;margin-top:8px}
.import-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:white;border:1px solid var(--borde);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;width:100%;position:relative}
.import-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.error-box{background:var(--rojo-claro);border:1px solid var(--rojo);border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px;color:var(--rojo)}
.config-box{background:var(--amarillo-claro);border:1px solid #e0c080;border-radius:12px;padding:14px;margin-bottom:14px}
.config-box p{font-size:13px;color:var(--amarillo);margin-bottom:8px}
.diag-card{border-radius:12px;padding:14px;margin-bottom:10px;border-width:1px;border-style:solid}
.diag-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.diag-content{font-size:13px;line-height:1.75;color:var(--texto)}
.diag-content strong{font-weight:600}
.diag-content em{font-style:italic;color:var(--texto2)}
.diag-item{padding:3px 0 3px 10px;border-left:3px solid currentColor;margin:4px 0;font-size:13px}
.diag-paso{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.07)}
.diag-paso:last-child{border-bottom:none}
.diag-paso-n{background:currentColor;color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.trat-tab-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid;transition:all 0.2s;text-align:center}
.feedback-bar{display:flex;gap:8px;margin-top:4px;margin-bottom:8px}
.fb-btn{flex:1;padding:11px 6px;border-radius:10px;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;background:white}
.fb-btn:hover{opacity:0.85}
</style>

function go(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  const idx = ['ia','dashboard','lotes','excel','alertas'].indexOf(name);
  if(idx>=0) document.querySelectorAll('.navbtn')[idx].classList.add('active');
  if(name==='ia') renderIA();
  if(name==='dashboard') renderDashboard();
  if(name==='lotes') renderLotes();
  if(name==='alertas') renderAlertas();
  if(name==='excel') renderExcel();
}

function getEstado(loteId) {
  const m = [...(excelData[loteId]||[]),...(monitoreoData[loteId]||[])];
  if(!m.length) return {estado:'verde',inc:0};
  const ult = m[m.length-1];
  const vals = Object.values(ult.plagas||{}).filter(v=>v>0);
  const max = vals.length?Math.max(...vals):0;
  return {estado:max>=0.16?'rojo':max>=0.08?'amarillo':'verde',inc:max};
}

let _pendingB64 = null;
let _pendingMime = null;

function handleFile(file, esAdicional = false) {
  if(!file) return;
  if(file.type.startsWith('video/')) { handleVideo(file); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result.split(',')[1];
    const mime = file.type||'image/jpeg';
    if(esAdicional) {
      // Foto adicional: agregar al array y reanalizar con todas
      _imagenesEnvio.push({data: b64, mediaType: mime});
      showPreviewAdicional(e.target.result, _imagenesEnvio.length);
      analizar(_imagenesEnvio[0].data, _imagenesEnvio[0].mediaType);
      return;
    }
    // Primera foto: resetear array
    _imagenesEnvio = [{data: b64, mediaType: mime}];
    showPreview(e.target.result);
    if(!loteSeleccionado) {
      _pendingB64 = b64;
      _pendingMime = mime;
      mostrarSelectorCultivo();
    } else {
      analizar(b64, mime);
    }
  };
  reader.readAsDataURL(file);
}

function confirmarCultivo(cultivoId) {
  if(_pendingB64) {
    analizar(_pendingB64, _pendingMime, cultivoId);
    _pendingB64 = null;
    _pendingMime = null;
  }
}

function reanalizar(cultivoId) {
  // Reusar la última imagen del preview para reanálisis con cultivo correcto
  const img = document.querySelector('#drop-area img.preview');
  if(!img) return;
  const canvas = document.createElement('canvas');
  const image = new Image();
  image.src = img.src;
  image.onload = () => {
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;
    canvas.getContext('2d').drawImage(image, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const b64 = dataUrl.split(',')[1];
    analizar(b64, 'image/jpeg', cultivoId);
  };
}

function handleVideo(file) {
  const video = document.createElement('video');
  const canvas = document.createElement('canvas');
  video.src = URL.createObjectURL(file);
  video.onloadeddata = () => {
    video.currentTime = Math.min(2, video.duration/3);
  };
  video.onseeked = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    const dataUrl = canvas.toDataURL('image/jpeg',0.85);
    const b64 = dataUrl.split(',')[1];
    _imagenesEnvio = [{data: b64, mediaType: 'image/jpeg'}];
    showPreview(dataUrl);
    if(!loteSeleccionado) {
      _pendingB64 = b64;
      _pendingMime = 'image/jpeg';
      mostrarSelectorCultivo();
    } else {
      analizar(b64, 'image/jpeg');
    }
    URL.revokeObjectURL(video.src);
  };
  video.load();
}

function showPreview(src) {
  // Reemplazar el label con un div simple para que no re-abra el picker
  const da = document.getElementById('drop-area');
  const div = document.createElement('div');
  div.id = 'drop-area';
  div.style.cssText = 'padding:0;border:none;background:transparent';
  div.innerHTML = `<img src="${src}" class="preview" style="margin:0;border-radius:10px">`;
  da.replaceWith(div);
}

function showPreviewAdicional(src, n) {
  // Añadir miniatura de foto adicional debajo del drop-area
  let adicDiv = document.getElementById('fotos-adicionales');

    adicDiv = document.createElement('div');

    document.getElementById('drop-area').after(adicDiv);

  img.title = `Foto adicional ${n}`;
  adicDiv.appendChild(img);
}

function importExcel(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result,{type:'array',cellDates:true});
      let total = 0;
      wb.SheetNames.forEach(sheetName=>{
        const match = sheetName.match(/LOTE[\s]?(\w+)/i);
        if(!match) return;
        const loteId = match[1].trim();
        if(!LOTES.find(l=>l.id===loteId)) return;
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:0});
        if(data.length<2) return;
        const headers = data[0];
        const registros = [];
        for(let i=1;i<data.length;i++){
          const row = data[i];
          if(!row||!row[0]) continue;
          let fecha;
          if(row[0] instanceof Date) fecha=row[0].toISOString().split('T')[0];
          else if(typeof row[0]==='number') fecha=new Date(Math.round((row[0]-25569)*86400*1000)).toISOString().split('T')[0];
          else fecha=String(row[0]).trim();
          if(!fecha||fecha==='null') continue;
          const plagas={};
          for(let j=1;j<headers.length;j++){
            if(headers[j]&&row[j]!==undefined) plagas[String(headers[j]).trim()]=parseFloat(row[j])||0;
          }
          registros.push({fecha,plagas});
        }
        if(registros.length){ excelData[loteId]=registros; total+=registros.length; }
      });
      localStorage.setItem('excelData',JSON.stringify(excelData));
      alert(`✅ Excel importado: ${total} registros de ${Object.keys(excelData).length} lotes`);
      renderDashboard();
    } catch(err){ alert('Error: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

}

// ── PARSEO VISUAL DEL DIAGNÓSTICO ─────────────────────────────────────────
function ucFirst(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():'';}

function convertirTablaMarkdown(texto) {
  const lineas = texto.split('\n');
  let html = '';
  let headers = [];
  let rows = [];
  let inTable = false;
  const flush = () => {
    if(!headers.length) return;
    const diagIdx = headers.findIndex(h=>/diagn/i.test(h));
    html += '<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:12px">';
    html += '<thead><tr>' + headers.map(h=>`<th style="padding:6px 10px;background:#f5f5f3;border:1px solid #e0e0dc;font-weight:600;text-align:left;color:var(--texto2)">${h}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(row=>{
      const diag=(diagIdx>=0?row[diagIdx]||'':'').toLowerCase();
      const bg=diag.includes('confirmada')||diag.includes('grave')?'#fff0f0':diag.includes('probable')||diag.includes('leve')||diag.includes('vigilar')?'#fffbf0':diag.includes('normal')?'#f0fff4':'white';
      const dot=diag.includes('confirmada')||diag.includes('grave')?'🔴':diag.includes('probable')||diag.includes('leve')?'🟡':diag.includes('normal')?'🟢':'';
      html+='<tr style="background:'+bg+'">';
      row.forEach((cell,i)=>{html+=`<td style="padding:6px 10px;border:1px solid #e0e0dc;font-size:12px">${i===row.length-1&&dot?dot+' '+cell:cell}</td>`;});
      html+='</tr>';
    });
    html += '</tbody></table></div>';
    headers=[]; rows=[];
  };
  for(const ln of lineas){
    const t=ln.trim();
    if(t.startsWith('|')&&!t.match(/^\|[\s\-|:]+\|$/)){
      const cells=t.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim());
      if(!inTable){inTable=true;headers=cells;}else{rows.push(cells);}
    } else if(t.match(/^\|[\s\-|:]+\|$/)){
      // separador, ignorar
    } else {
      if(inTable){flush();inTable=false;}
      html+=ln+'\n';
    }
  }
  if(inTable)flush();
  return html;
}

function formatearTexto(t) {
  let s = (t||'')
    .replace(/^#{1,3}\s*/gm, '')           // quitar ##, ###
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
    .replace(/\*+/g, '')                   // asteriscos sueltos
    .replace(/#+/g, '')                    // hashes sueltos
    .replace(/^---+\s*$/gm, '');
  // Detectar y convertir tablas markdown
  s = convertirTablaMarkdown(s);
  return s
    .replace(/^• (.+)$/gm, '<div class="diag-item" style="color:var(--verde)">• $1</div>')
    .replace(/^- (.+)$/gm, '<div class="diag-item" style="color:var(--texto2)">– $1</div>')
    .replace(/^(Paso \d+):\s*(.+)$/gm, (_,n,txt)=>`<div class="diag-paso"><div class="diag-paso-n" style="color:var(--verde)">${n.replace('Paso ','')}</div><div style="flex:1;font-size:13px">${txt}</div></div>`)
    .replace(/\n\n+/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function parsearResultado(texto) {
  const defs = {
    '🌿':{ bg:'var(--verde-claro)', bd:'var(--verde)', tc:'var(--verde)' },
    '🔍':{ bg:'#E3F2FD', bd:'#1565C0', tc:'#1565C0' },
    '📍':{ bg:'var(--gris)', bd:'var(--borde)', tc:'var(--texto2)' },
    '🚨':{ bg:'var(--rojo-claro)', bd:'var(--rojo)', tc:'var(--rojo)' },
    '📊':{ bg:'var(--amarillo-claro)', bd:'var(--amarillo)', tc:'var(--amarillo)' },
    '🌱':{ bg:'#E8F5E9', bd:'#388E3C', tc:'#2E7D32' },
    '🧬':{ bg:'#EDE7F6', bd:'#7B1FA2', tc:'#6A1B9A' },
    '💊':{ bg:'#FFF8E1', bd:'#F57F17', tc:'#E65100' },
    '⏰':{ bg:'#ECEFF1', bd:'#607D8B', tc:'#455A64' },
    '🛡️':{ bg:'var(--verde-claro)', bd:'var(--verde-med)', tc:'var(--verde)' },
    '🔎':{ bg:'#FFF3E0', bd:'#BF360C', tc:'#BF360C' },
    '⚡':{ bg:'var(--rojo-claro)', bd:'var(--rojo)', tc:'var(--rojo)' },
  };
  const emojis = Object.keys(defs);

  const lineas = texto.split('\n');
  const secciones = [];
  let cur = null;

  for (const ln of lineas) {
    const trim = ln.trim();
    const found = emojis.find(e => trim.startsWith(e));
    if (found) {
      if (cur) secciones.push(cur);
      cur = { emoji: found, header: trim, def: defs[found], body: [] };
    } else if (cur && trim !== '---') {
      cur.body.push(ln);
    }
  }
  if (cur) secciones.push(cur);

  let html = '';
  for (const s of secciones) {
    if (s.emoji === '📷') continue;
    const { bg, bd, tc } = s.def;
    if (s.emoji === '💊') {
      html += renderTratamiento(s.header, s.body.join('\n'), bg, bd, tc);
    } else {
      // Separar el título del valor (lo que viene después de ":")
      const colonIdx = s.header.indexOf(':');
      let titulo = s.header;
      let valorInline = '';
      if (colonIdx > 0 && colonIdx < s.header.length - 2) {
        titulo = s.header.substring(0, colonIdx).trim();
        // Convertir a sentence case para evitar todo en mayúsculas
        const rawVal = s.header.substring(colonIdx + 1).trim();
        valorInline = rawVal.charAt(0).toUpperCase() + rawVal.slice(1).toLowerCase()
          .replace(/\b(palta|lúcuma|mandarina|uva|caqui|limón|toronja|hass|fuerte|okitsu|río|hoja|fruto|tallo|raíz|leve|moderado|grave)\b/gi, m=>m.charAt(0).toUpperCase()+m.slice(1));
      }
      const contenido = formatearTexto(s.body.join('\n')).trim();
      html += `<div class="diag-card" style="background:${bg};border-color:${bd}">
        <div class="diag-card-title" style="color:${tc}">${titulo}</div>
        ${valorInline ? `<div style="font-size:14px;font-weight:500;color:var(--texto);margin-bottom:${contenido?'8px':'0'};line-height:1.4">${valorInline}</div>` : ''}
        ${contenido ? `<div class="diag-content">${contenido}</div>` : ''}
      </div>`;
    }
  }
  return html || `<div class="diag-content" style="white-space:pre-line">${texto}</div>`;
}

function renderTratamiento(header, body, bg, bd, tc) {
  const opt1 = body.match(/🌿 OPCI[ÓO]N[\s\S]*?ORGÁNICA[^\n]*([\s\S]*?)(?=⚖️ OPCI|🧪 OPCI|$)/i);
  const opt2 = body.match(/⚖️ OPCI[ÓO]N[\s\S]*?BALANCEADA[^\n]*([\s\S]*?)(?=🧪 OPCI|$)/i);
  const opt3 = body.match(/🧪 OPCI[ÓO]N[\s\S]*?QU[ÍI]MICA[^\n]*([\s\S]*?)$/i);

  const opts = [
    { label:'🌿 Orgánica', texto: opt1?.[1]||'', bc:'#3B6D11', bg2:'#EAF3DE' },
    { label:'⚖️ Balanceada', texto: opt2?.[1]||'', bc:'#854F0B', bg2:'#FAEEDA' },
    { label:'🧪 Química', texto: opt3?.[1]||'', bc:'#A32D2D', bg2:'#FCEBEB' },
  ].filter(o => o.texto.trim());

  if (!opts.length) {
    return `<div class="diag-card" style="background:${bg};border-color:${bd}">
      <div class="diag-card-title" style="color:${tc}">${header}</div>
      <div class="diag-content">${formatearTexto(body)}</div>
    </div>`;
  }

  const tid = 'trat' + Date.now();
  return `<div class="diag-card" style="background:${bg};border-color:${bd}">
    <div class="diag-card-title" style="color:${tc}">${header}</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${opts.map((o,i)=>`<button class="trat-tab-btn" id="${tid}-t${i}"
        style="border-color:${o.bc};background:${i===0?o.bc:'white'};color:${i===0?'white':o.bc}"
        onclick="selTab('${tid}',${i})">${o.label}</button>`).join('')}
    </div>
    ${opts.map((o,i)=>`<div id="${tid}-c${i}" style="display:${i===0?'block':'none'};background:white;border:1px solid ${o.bc}40;border-radius:10px;padding:12px">
      <div class="diag-content">${formatearTextoProducto(o.texto)}</div>
    </div>`).join('')}
  </div>`;
}

function formatearTextoProducto(t) {
  const campos = ['Producto','Eficacia','Dosis por','Precio referencial','Costo producto','Costo mano de obra','Costo total','Opinión IA'];
  const iconos = {'Producto':'🧴','Eficacia':'📊','Dosis por':'⚗️','Precio referencial':'💰','Costo producto':'💰','Costo mano de obra':'👷','Costo total':'💵','Opinión IA':'🤖'};
  const colores = {'Costo total':'font-weight:700;color:var(--verde)','Opinión IA':'color:#5E35B1;font-style:italic'};
  let s = (t||'').replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>').replace(/#+/g,'').replace(/\*+/g,'');
  const regex = new RegExp(`^(${campos.map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')}):\\s*(.+)$`,'gm');
  s = s.replace(regex,(_,k,v)=>{
    const ic=iconos[k]||'';
    const st=colores[k]||'';
    return `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0ec;font-size:13px;align-items:flex-start">
      <span style="flex-shrink:0;width:20px;text-align:center">${ic}</span>
      <span style="font-weight:600;min-width:110px;color:var(--texto2);flex-shrink:0;font-size:12px">${k}</span>
      <span style="${st}">${v}</span></div>`;
  });
  return s.replace(/\n+/g,'');
}

function selTab(tid, idx) {
  const colors = ['#3B6D11','#854F0B','#A32D2D'];
  for(let i=0;i<3;i++){
    const t=document.getElementById(tid+'-t'+i);
    const c=document.getElementById(tid+'-c'+i);
    if(t){t.style.background=i===idx?colors[i]:'white';t.style.color=i===idx?'white':colors[i];}
    if(c)c.style.display=i===idx?'block':'none';
  }
}

    const entrada = historialIA.find(h=>h.id===id) || {};
    ed.innerHTML = `
      <div style="background:#f9f9f7;border-radius:10px;padding:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;color:var(--texto2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Corregir diagnóstico</div>
        <div style="display:grid;gap:8px">
          <div>
            <div style="font-size:11px;color:var(--texto2);margin-bottom:3px">🌿 Cultivo real</div>
            <input id="fb-cultivo-${id}" class="form-input" value="${entrada.cultivo||''}" style="font-size:13px">
          </div>
          <div>
            <div style="font-size:11px;color:var(--texto2);margin-bottom:3px">🔍 Problema / plaga real</div>
            <input id="fb-problema-${id}" class="form-input" placeholder="Ej: Arañita roja — adulto 12%, huevo 8%" style="font-size:13px" value="${entrada.problema&&entrada.problema!=='Ver diagnóstico'?entrada.problema:''}">
          </div>
          <div>
            <div style="font-size:11px;color:var(--texto2);margin-bottom:3px">🚨 Severidad real</div>
            <select id="fb-sev-${id}" class="form-input" style="font-size:13px">
              <option ${entrada.severidad==='Leve'?'selected':''}>Leve</option>
              <option ${entrada.severidad==='Moderado'?'selected':''}>Moderado</option>
              <option ${entrada.severidad==='Grave'?'selected':''}>Grave</option>
            </select>
          </div>
          <div>
            <div style="font-size:11px;color:var(--texto2);margin-bottom:3px">📝 Observación adicional</div>
            <input id="fb-obs-${id}" class="form-input" placeholder="Ej: foto sin zoom, confundió con deficiencia" style="font-size:13px">
          </div>
          <div style="background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:10px">
            <div style="font-size:11px;color:#b8860b;font-weight:700;margin-bottom:6px">🌱 ¿El estado fenológico estaba errado?</div>
            <div style="font-size:11px;color:var(--texto2);margin-bottom:6px">Estado que usó el sistema: <b>${entrada.fenologia||'No detectado'}</b> — Lote ${entrada.lote||''}</div>
            <select id="fb-fenologia-${id}" class="form-input" style="font-size:13px">
              <option value="">— Era correcto, no corregir —</option>
              <option>Desarrollo fruto</option>
              <option>Floración</option>
              <option>Cuajado</option>
              <option>Maduración</option>
              <option>Cosecha</option>
              <option>Post-Cosecha</option>
              <option>Poda</option>
              <option>Mantenimiento</option>
            </select>
          </div>
        </div>
        <button onclick="guardarFeedbackTexto(${id})" style="margin-top:12px;width:100%;padding:10px;background:var(--verde);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Guardar corrección</button>
      </div>`;
    ed.style.display = 'block';
    return;
  }
  const idx = historialIA.findIndex(h=>h.id===id);
  if (idx>=0) { historialIA[idx].feedback = tipo; localStorage.setItem('historialIA',JSON.stringify(historialIA)); }
  if (tipo === 'acertado') {
    const h = historialIA[idx] || {};
    fetch('https://fundo-ishizawa2-1.onrender.com/feedback', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tipo:'acertado', lote: h.lote||'', cultivo: h.cultivo||'', problema_detectado: h.problema||'', fecha: h.fecha||'' }) });
    btn.closest('.feedback-bar').innerHTML = '<div style="color:var(--verde);font-weight:600;font-size:13px">✅ Perfecto, gracias por confirmar — el sistema aprende de cada diagnóstico correcto</div>';
  } else {
    btn.closest('.feedback-bar').innerHTML = '<div style="color:var(--rojo);font-weight:600;font-size:13px">❌ Marcado como errado — completa la corrección abajo</div>';
  }
}

function guardarFeedbackTexto(id) {
  const cultivo = document.getElementById('fb-cultivo-'+id)?.value||'';
  const problema = document.getElementById('fb-problema-'+id)?.value||'';
  const sev = document.getElementById('fb-sev-'+id)?.value||'';
  const obs = document.getElementById('fb-obs-'+id)?.value||'';
  const fenologiaCorrecta = document.getElementById('fb-fenologia-'+id)?.value||'';
  const idx = historialIA.findIndex(h=>h.id===id);
  const h = idx>=0 ? historialIA[idx] : {};
  if (idx>=0) {
    historialIA[idx].feedback='editado';
    if(cultivo) historialIA[idx].cultivoCorregido=cultivo;
    if(problema) historialIA[idx].problemaCorregido=problema;
    if(sev) historialIA[idx].severidadCorregida=sev;
    if(obs) historialIA[idx].observacion=obs;
    if(fenologiaCorrecta) historialIA[idx].fenologiaCorregida=fenologiaCorrecta;
    localStorage.setItem('historialIA',JSON.stringify(historialIA));
  }
  const mes = new Date().getMonth();
  fetch('https://fundo-ishizawa2-1.onrender.com/feedback', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ tipo:'correccion', lote: h.lote||'', cultivo: cultivo||h.cultivo||'', problema_detectado: h.problema||'', problema_real: problema, severidad: sev, observacion: obs, fecha: h.fecha||'', fenologia_correcta: fenologiaCorrecta||'', mes }) });
  let msg = '✅ ¡Muchas gracias por la corrección! El sistema aprenderá de este caso.';
  if (fenologiaCorrecta) msg = `✅ ¡Gracias! Estado fenológico del Lote ${h.lote||''} actualizado a "${fenologiaCorrecta}". El sistema ya lo usará en los próximos diagnósticos de este lote.`;
  document.getElementById('fb-edit-'+id).innerHTML = `<div style="color:var(--verde);font-weight:600;font-size:13px;padding:10px 0">${msg}</div>`;
}

// ── PANTALLA EXCEL ────────────────────────────────────────────────────────
function renderExcel() {
  const total = Object.values(excelData).reduce((s,a)=>s+a.length,0);
  const feedback = historialIA.filter(h=>h.feedback);
  const sueloGuardados = Object.keys(sueloData);

  document.getElementById('s-excel').innerHTML = `
    <div class="card">
      <div class="card-title">Subir historial de plagas (Excel)</div>
      <p style="font-size:13px;color:var(--texto2);margin-bottom:12px">Importa tu Excel de evaluaciones fitosanitarias. Cada hoja debe llamarse LOTE1, LOTE7, etc.</p>
      <label class="import-btn">
        <input type="file" accept=".xlsx,.xls" onchange="importExcel(this)">
        📊 Seleccionar archivo Excel
      </label>
      ${total ? `<div style="margin-top:10px;font-size:13px;color:var(--verde);font-weight:500">✓ ${total} registros cargados en ${Object.keys(excelData).length} lotes</div>` : ''}
    </div>

    <div class="card" style="border:1px solid #7B1FA2">
      <div class="card-title" style="color:#6A1B9A">🧪 Análisis de Suelo por Lote</div>
      <p style="font-size:13px;color:var(--texto2);margin-bottom:12px">
        Ingresa los resultados de tu análisis de laboratorio. La IA los usará automáticamente al diagnosticar cada lote.
      </p>

      <div style="margin-bottom:10px">
        <label class="form-label">Lote</label>
        <select id="suelo-lote" class="form-input" style="font-size:13px">
          <option value="general">General (aplica a todos)</option>
          ${LOTES.map(l=>`<option value="${l.id}" ${sueloData[l.id]?'':''}>${l.nombre} — ${l.cultivo}</option>`).join('')}
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label class="form-label">pH</label>
          <input id="suelo-ph" class="form-input" type="number" step="0.1" min="0" max="14" placeholder="Ej: 6.8">
        </div>
        <div>
          <label class="form-label">CE (mS/cm)</label>
          <input id="suelo-ce" class="form-input" type="number" step="0.01" placeholder="Ej: 1.2">
        </div>
        <div>
          <label class="form-label">Materia orgánica (%)</label>
          <input id="suelo-mo" class="form-input" type="number" step="0.1" placeholder="Ej: 2.5">
        </div>
        <div>
          <label class="form-label">N disponible (ppm)</label>
          <input id="suelo-n" class="form-input" type="number" placeholder="Ej: 45">
        </div>
        <div>
          <label class="form-label">P disponible (ppm)</label>
          <input id="suelo-p" class="form-input" type="number" placeholder="Ej: 22">
        </div>
        <div>
          <label class="form-label">K disponible (ppm)</label>
          <input id="suelo-k" class="form-input" type="number" placeholder="Ej: 180">
        </div>
      </div>
      <div>
        <label class="form-label">Textura / observaciones del laboratorio</label>
        <input id="suelo-obs" class="form-input" placeholder="Ej: Franco arenoso, ligera salinidad" style="font-size:13px">
      </div>
      <button onclick="guardarSuelo()" class="btn-primary" style="border-radius:10px;margin-top:12px;background:#7B1FA2">
        💾 Guardar análisis de suelo
      </button>

      ${sueloGuardados.length ? `
      <div style="margin-top:14px;border-top:1px solid var(--borde);padding-top:12px">
        <div style="font-size:11px;font-weight:700;color:var(--texto2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Análisis guardados</div>
        ${sueloGuardados.map(id=>{
          const d=sueloData[id];
          const nombre = id==='general'?'General':LOTES.find(l=>l.id===id)?.nombre||id;
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--borde)">
            <div>
              <div style="font-size:13px;font-weight:500">${nombre}</div>
              <div style="font-size:11px;color:var(--texto2)">
                ${d.ph?'pH '+d.ph:''} ${d.ce?'· CE '+d.ce:''} ${d.mo?'· MO '+d.mo+'%':''}
              </div>
            </div>
            <button onclick="cargarSuelo('${id}')" style="font-size:11px;padding:4px 10px;background:var(--verde-claro);color:var(--verde);border:1px solid var(--verde);border-radius:6px;cursor:pointer">Editar</button>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">Exportar historial de análisis IA</div>
      <p style="font-size:13px;color:var(--texto2);margin-bottom:12px">${historialIA.length} análisis guardados</p>
      <button class="btn-primary" style="border-radius:10px" onclick="exportarHistorial()">📥 Exportar a Excel</button>
    </div>

    ${feedback.length ? `<div class="card">
      <div class="card-title">Correcciones guardadas (${feedback.length})</div>
      ${feedback.slice(0,10).map(h=>`<div class="plaga-row">
        <div style="flex:1">
          <div class="plaga-nombre">${h.lote||''} · ${h.cultivoCorregido||h.cultivo||''}</div>
          <div style="font-size:11px;color:var(--texto2)">${h.fecha} · ${h.problemaCorregido||h.problema||''}</div>
          ${h.observacion?`<div style="font-size:12px;color:var(--amarillo);margin-top:2px">${h.observacion}</div>`:''}
        </div>
        <span style="font-size:18px">${h.feedback==='acertado'?'✅':h.feedback==='errado'?'❌':'✏️'}</span>
      </div>`).join('')}
    </div>` : ''}
  `;
}

function guardarSuelo() {
  const loteId = document.getElementById('suelo-lote').value;
  const d = {
    ph:  document.getElementById('suelo-ph').value,
    ce:  document.getElementById('suelo-ce').value,
    mo:  document.getElementById('suelo-mo').value,
    n:   document.getElementById('suelo-n').value,
    p:   document.getElementById('suelo-p').value,
    k:   document.getElementById('suelo-k').value,
    obs: document.getElementById('suelo-obs').value,
    fecha: new Date().toLocaleDateString('es-PE')
  };
  // Solo guardar campos con valor
  Object.keys(d).forEach(k=>{ if(!d[k]) delete d[k]; });
  if(!Object.keys(d).filter(k=>k!=='fecha').length) { alert('Ingresa al menos un valor'); return; }
  sueloData[loteId] = d;
  localStorage.setItem('sueloData', JSON.stringify(sueloData));
  const nombre = loteId==='general'?'todos los lotes':LOTES.find(l=>l.id===loteId)?.nombre||loteId;
  alert(`✅ Análisis de suelo guardado para ${nombre}`);
  renderExcel();
}

function cargarSuelo(loteId) {
  const d = sueloData[loteId]||{};
  document.getElementById('suelo-lote').value = loteId;
  document.getElementById('suelo-ph').value = d.ph||'';
  document.getElementById('suelo-ce').value = d.ce||'';
  document.getElementById('suelo-mo').value = d.mo||'';
  document.getElementById('suelo-n').value  = d.n||'';
  document.getElementById('suelo-p').value  = d.p||'';
  document.getElementById('suelo-k').value  = d.k||'';
  document.getElementById('suelo-obs').value = d.obs||'';
}

renderIA();
</script>
</body>
</html>
